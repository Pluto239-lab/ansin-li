<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>API練習</title>
<link rel="stylesheet" type="text/css" href=".\css.css">
<style>
</style>
</head>
<body>
    <h1  class="left">Beework</h1>
    <hr />
    <div class="div">
            <div class="left">管理者一覧</div>
            <br />
            <div class="blo1">氏名</div>
            <div class="blo1"><input type="text" required></div>
            <div class="blo1">メール</div>
            <div class="blo1"><input type="text" required></div>
            <div class="blo1">電話番号</div>
            <div class="blo1"><input type="text" required></div>
            <br />
            <div id="a1">
                <div class="blo2"><input class="tran0" id="clearBtn" type="button" value="クレア"></div>
                <div class="blo2"><input class="tran0" id="searchBtn" type="button" value="検索"></div>
            </div>
    </div>
    <div class="div">
        <table>
            <tbody>
                <tr>

                </tr>

            </tbody>
        </table>
        <div class="right">
            <div class="blo3"><input class="tran"  type="button" value="新規"></div>
            <div class="blo3"><input class="tran"  type="button" value="ロック"></div>
            <div class="blo3"><input class="tran"  type="button" value="アンロック"></div>
            <div class="blo3"><input class="tran"  type="button" value="削除"></div>
        </div>
        <br />
        <div class="blo4" id="blo401">総計０件</div>
        <div class="blo4"><select id="blo402">
            <option value=5>5件/ページ</option>
            <option value=10>10件/ページ</option>
            <option value=20>20件/ページ</option>
        </select></div>
        <div class="blo4" id="blo403">
        </div>
        <div class="blo4"><input id="b1" type="text" required value="1"><span id="pageChenge">ページ目へ</span></div>
    </div>
    <script>
        async function getData(searchParams = {}) {
            const res = await fetch('http://localhost:3000/api/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    authority: searchParams.authority || '00',
                    userMail: searchParams.userMail || '',
                    userName: searchParams.userName || '',
                    userTel: searchParams.userTel || ''
                })
            });
            const data = await res.json();
            return data;
        }

        async function beeworkMain() {
            let data = await getData();
            const blo403 = document.getElementById("blo403");
            const dataSum = document.getElementById("blo401");
            const clear = document.querySelector("#a1 .tran0");
            const search = document.getElementById("searchBtn");
            let valueParPage = 5;
            let pageNow = 1;
            let pageSum = Math.ceil(data.length/valueParPage); 

            function allData(){
                const tbody = document.querySelector("tbody");
                tbody.replaceChildren(); 
                {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <th><input type="checkbox" id = "cleckAll"></th>
                    <th>管理者</th>
                    <th>性別</th>
                    <th>状態</th>
                    <th>電話番号</th>
                    <th>メール</th>
                    <th>権限</th>
                    <th>最終ログイン日時</th>`
                    tbody.appendChild(tr);
                }
                for(let i = (pageNow - 1)* valueParPage;i < Math.min(data.length,pageNow * valueParPage);i++){
                    const tr = document.createElement('tr');
                    tr.className = 'detil';
                    tr.id = `detil${i}`;
                    tr.innerHTML = `
                    <td><input type="checkbox"></td>
                    <td>${data[i].userName}</td>
                    <td>${data[i].sex}</td>
                    <td>${data[i].userStatus}</td>
                    <td>${data[i].userTel}</td>
                    <td>${data[i].userMail}</td>
                    <td>${data[i].authority}</td>
                    <td>${data[i].updateTime}</td>
                    <td><input class="tran"  type="button" value="情報修正"></td>
                    <td><input class="tran"  type="button" value="ロック"></td>
                    <td><input class="tran"  type="button" value="削除"></td>`;
                    tbody.appendChild(tr);
                }
            }
            allData()

            function pageAll(){
                blo403.replaceChildren();                               
                {
                    const input = document.createElement('input');
                    input.className = "button";
                    input.type = "button";
                    input.value = "<";
                    input.id = `pageDownButton`;
                    blo403.appendChild(input);
                }
                for(let i = 1;i <= pageSum;i++){
                    const input = document.createElement('input');
                    input.className = "button";
                    input.type = "button";
                    input.value = `${i}`;
                    input.id = `pageButton${i}`;
                    blo403.appendChild(input);
                }
                {
                    const input = document.createElement('input');
                    input.className = "button";
                    input.type = "button";
                    input.value =">";
                    input.id = `pageUpButton`;
                    blo403.appendChild(input);                    
                }
                {
                    const ellipsis0 = document.createElement('input');
                    const ellipsis1 = document.createElement('input');
                    ellipsis0.className = "button";
                    ellipsis0.type = "button";
                    ellipsis0.value = "...";
                    ellipsis0.id = "ellipsis0";
                    ellipsis1.className = "button";
                    ellipsis1.type = "button";
                    ellipsis1.value = "...";
                    ellipsis1.id = "ellipsis1";
                    const head = document.getElementById("pageButton2");
                    const bottom = document.getElementById(`pageButton${pageSum}`);
                    blo403.insertBefore(ellipsis0,head);
                    blo403.insertBefore(ellipsis1,bottom);
                }
            }
            pageAll()

            function showData(){allData()}
            
            function showPage(){
                for(let i = 1; i <= pageSum; i++)document.getElementById(`pageButton${i}`).style.backgroundColor = "";
                document.getElementById(`pageButton${pageNow}`).style.backgroundColor = "#0fc";
                if(pageNow <= 3)document.getElementById("ellipsis0").style.display = "none";
                else document.getElementById("ellipsis0").style.display = "inline-block"
                if(pageNow >= pageSum-2)document.getElementById("ellipsis1").style.display = "none";
                else document.getElementById("ellipsis1").style.display = "inline-block"
                for(let i = 2; i <= pageSum-1; i++){
                    if(i != pageNow && i != pageNow+1 && i != pageNow-1)document.getElementById(`pageButton${i}`).style.display = "none";
                    else document.getElementById(`pageButton${i}`).style.display = "inline-block";
                }
            }
            showPage()
            
            dataSum.innerText =`総計${data.length}件`;
            
            function clearInput(){
                const selectInput = document.querySelectorAll(".blo1 input")
                for(let i = 0;i < selectInput.length;i++)
                selectInput[i].value = null;
            }
            clear.onclick = clearInput;

            function vppSwitch(){
                valueParPage = document.getElementById("blo402").value;
                pageSum = Math.ceil(data.length/valueParPage);
                pageNow = 1;
                pageAll();
                showData();showPage();
            }
            document.getElementById("blo402").onchange = vppSwitch;

            function pageIntext(){
                const pageIntext = Number(document.getElementById("b1").value);
                if(pageIntext >= 1 && pageIntext <= pageSum)pageNow = pageIntext;
                else alert("no page");                
                showData();showPage();
            }
            document.getElementById("pageChenge").onclick = pageIntext;

            function pageSwitch(e){
                const pageSwitch = e.target.value;
                if(pageSwitch >= 1 && pageSwitch <= pageSum)pageNow = Number(pageSwitch);
                else if(pageSwitch == ">" && pageNow < pageSum)pageNow++;
                else if(pageSwitch == "<" && pageNow > 1)pageNow--;
                showData();showPage();
            }
            blo403.onclick = pageSwitch;

            const cleckAll = document.getElementById("cleckAll")            
            function clackAll(){
                const cleckBox = document.querySelectorAll('.detil input[type="checkbox"]')
                for(let i = 0;i < cleckBox.length;i++)cleckBox[i].checked = cleckAll.checked;
            }
            cleckAll.onchange = clackAll;
            
            async function doSearch(){
                const inputs = document.querySelectorAll(".blo1 input");
                data = await getData({
                    userName: inputs[0].value || "",
                    userMail: inputs[1].value || "",
                    userTel:  inputs[2].value || ""
                });
                pageSum = Math.ceil(data.length / valueParPage);
                pageNow = 1;
                allData();
                pageAll();
                showPage();
                dataSum.innerText = `総計${data.length}件`;
            }
            search.onclick = doSearch;

        }
        beeworkMain()
    </script>
</body>
</html>
