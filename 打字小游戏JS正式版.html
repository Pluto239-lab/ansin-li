<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>打字小游戏</title>
    <style>
        .all{
            position: relative;
            height: 700px;
            background-color: #6cf;
        }
        .top{
            background-color: #0fc;
            height: 75px;
        }
        .dif{
            text-align: center;
        }
        .game{
            width: 500px;
            height: 300px;
            position:absolute;
            left: 50%;
            margin-left: -250px;
            top: 150px;
            z-index: 1;
            background-color: #060;
        }
        #end{
            z-index: 2;
            background-color: #050;
            display:none;
        }
        #menu{
            position: absolute;
            left: 20px;
            bottom: 30px;
        }
        .gameover, .gamestr{
            text-align: center;
            color: #fff;
        }
        #end1{
            font-size: 32px;
            font-weight: bold;
            margin: 80px 0px 60px;
            color: #f00;
        }
        #end2{
            margin-bottom: 10px;
        }
        #time, #score{
            position: absolute;
            top: 60px;
        }
        #time{
            left: 20px;
        }
        #score{
            right: 20px;
        }
        #big{
            font-size: 32px;
            font-weight: bold;
            margin: 40px 0px 20px;
        }
        #small{
            margin-bottom: 30px;
        }
        #word{
            font-size: 32px; 
            font-weight: bold; 
            color: #ddd; 
            height: 40px; 
            margin-bottom: 35px;
            word-break: break-all; 
            line-height: 32px;
        }
        #input{
            width: 400px;
            height: 30px;
        }
    </style>
</head>
<body>
    <div class = "all">
        <div class="top"><br />
            <div class="dif" id="medif">Difficulty
                <select name="dif" id="dif">
                    <option value="Hard">Hard</option>
                    <option value="Normal">Normal</option>
                    <option value="Easy">Easy</option>
                </select>
            </div>
        </div>
        <div class="game" id="start">
            <div class="gamestr" id="time">Time left <span id="lastTime">10</span> s</div>
            <div class="gamestr" id="score">score: <span class="sum">0</span></div>
            <div class="gamestr" id="big">Speed Typer</div>
            <div class="gamestr" id="small">Type the following</div>
            <div class="gamestr" id="word">abandon</div>
            <div class="gamestr" >
                <input type="text" id="input">
            </div>
        </div>
        <div class="game" id="end">
            <div class="gameover" id="end1">Time ran out</div>
            <div class="gameover" id="end2">your final score is <span class="sum">0</span></div>
            <div class="gameover" id="end3"><button id="reload">Reload</button></div>
        </div>
        <div>
            <button id="menu">メニュー</button>
        </div>
    </div>

    <script>
        var wordList = [
        "ace","acid","aged","ago","air","aim","area","army","atom","auto",
        "able","also","away","arch","aunt","axis","alike","alive","apple",
        "back","ball","band","bank","base","bath","bear","beat","bell","belt",
        "best","bird","bite","blue","boat","body","book","boot","born","boss",
        "both","bowl","burn","busy","byte",
        "cake","call","calm","camp","card","care","case","cash","cast","cell",
        "chat","chip","city","clay","clip","club","coat","cold","come","cook",
        "cool","copy","core","cost","crop","cube","cute",
        "dark","data","date","dawn","dead","deal","deer","desk","dial","diet",
        "door","down","draw","drop","drum","dust","duty",
        "each","earn","east","easy","edge","else","even","ever","exam","exit",
        "eye","echo",
        "face","fact","fair","fall","farm","fast","fear","feed","feel","file",
        "fill","film","find","fire","fish","five","flat","flow","food","foot",
        "form","four","free","frog","fuel","full",
        "game","gate","gear","gift","girl","give","glad","goal","gold","good",
        "gray","grow",
        "hair","half","hand","hard","harm","hate","have","head","hear","heat",
        "help","hero","high","hill","hire","hold","hole","home","hope","huge",
        "hunt",
        "idea","inch","into","iron","item",
        "jazz","join","joke","jump","just",
        "keep","kick","kill","kind","king","kiss","knee","know",
        "lack","lady","lake","lamp","land","last","late","lead","leaf","left",
        "life","lift","like","line","lion","list","live","load","lock","long",
        "look","lose","love","luck","lunch",
        "made","mail","main","make","many","mark","mass","meal","mean","meet",
        "milk","mind","mine","miss","mode","moon","more","most","move","much",
        "must",
        "name","near","neck","need","news","next","nice","nine","none","nose",
        "note",
        "once","only","open","over","oven",
        "pack","page","pain","pair","park","part","pass","path","pay","peak",
        "pear","pen","pet","pick","pink","plan","play","plug","plus","poem",
        "pool","poor","port","post","pull","push",
        "quit","quiz",
        "race","rain","rank","rate","read","real","rest","rice","rich","ride",
        "ring","rise","road","rock","role","roll","roof","room","root","rule",
        "rush",
        "safe","sail","salt","sand","save","seat","seed","seek","seem","sell",
        "send","ship","shoe","shop","shot","show","shut","sick","side","sign",
        "sing","sink","size","skin","slow","snow","soft","soil","song","soon",
        "sort","soul","soup","star","stay","step","stop","such","suit","sure",
        "swim",
        "tail","take","talk","tall","tank","tape","task","team","tear","tell",
        "tend","tent","term","test","text","thin","this","time","tiny","tire",
        "tone","tool","town","tree","trip","true","turn","type",
        "unit","upon","used","user",
        "vast","very","view","vote",
        "wait","walk","wall","want","warm","wash","wave","weak","wear","week",
        "well","west","what","when","wide","wife","wild","wind","wine","wing",
        "wire","wise","wish","wood","word","work",
        "yard","year","yell","your"
        ];
        var sum = 0, time = 10, i = 0;
        var answer = document.getElementById("word");
        var timer = null, dif, savedDif;
        var menu = document.getElementById("menu");
        var medif = document.getElementById("medif");
        var oScore = document.getElementsByClassName("sum");
        
        window.onload = function(){
            var savedDif = localStorage.getItem("dif");
            if(savedDif){
                document.getElementById("dif").value = savedDif;
                DifSwitch(); // 让时间同步
            }
        }
        function DifOnOff(){
            if(medif.style.display === "none")medif.style.display = "block";else
            medif.style.display = "none";
        };
        menu.onclick = DifOnOff;
        function DifSwitch(){
            dif = document.getElementById("dif").value;
            switch (dif) {
            case "Hard": time = 10;break;
            case "Normal": time = 15;break;
            case "Easy": time = 30;break;}
            oTime.innerText = time;            
            sum = 0;
            oScore[0].innerText = sum;
            oScore[1].innerText = sum;
            savedDif = localStorage.setItem("dif", dif);
        }
        document.getElementById("dif").onchange = DifSwitch;
        var oTime = document.getElementById("lastTime");
        function gamestart(){
            if(timer)return;//g
            timer = setInterval(function(){
                time--;oTime.innerText = time;
                var end = document.getElementById("end")
                if(time == 0){
                    clearInterval(timer);
                    timer = null;
                    end.style.display = "block";
                }
            },1000)
        }
        onkeydown = gamestart;
        function next (){
            var input = document.getElementById("input");
            var inword = input.value;
            if(inword === answer.innerText){
                i = Math.floor(Math.random()*(wordList.length));
                answer.innerText = wordList[i];
                sum++;
                input.value = "";
            }
        oScore[0].innerText = sum;
        oScore[1].innerText = sum;
        }
        onkeyup = next;
        var reload = document.getElementById("reload");
        reload.onclick = function () {
            location.reload();
        };
        
    </script>
</body>
</html>
